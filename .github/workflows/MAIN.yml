name: Generate Snake

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v3

      # Generate snake
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: vireakech6724
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg

      # Commit safely (no crash if no changes)
      - name: Commit files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ || true
          git diff --cached --quiet || git commit -m "update snake"

      # Pull latest (avoid conflicts)
      - name: Pull latest
        run: git pull origin main --rebase

      # Push with permission
      - name: Push changes
        run: |
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/vireakech6724/vireakech6724.git main
